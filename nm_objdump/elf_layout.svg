<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1200" height="640" fill="#0d1117"/>

  <text x="600" y="50" font-size="30" fill="#ffffff" text-anchor="middle" font-weight="bold">ELF File Layout</text>
  <text x="600" y="80" font-size="16" fill="#8b949e" text-anchor="middle">Two parallel views of the same bytes: segments (runtime) and sections (link/analysis)</text>

  <!-- File outline -->
  <rect x="100" y="120" width="1000" height="460" rx="10" fill="none" stroke="#30363d" stroke-width="2"/>
  <text x="120" y="145" font-size="14" fill="#8b949e">file on disk</text>

  <!-- ELF Header -->
  <rect x="130" y="160" width="940" height="60" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="600" y="185" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">ELF Header</text>
  <text x="600" y="207" font-size="13" fill="#dbe9ff" text-anchor="middle">class (32/64-bit) · endianness · type · machine · entry point · e_phoff · e_shoff</text>

  <!-- Program Header Table -->
  <rect x="130" y="235" width="940" height="70" rx="6" fill="#238636" stroke="#3fb950" stroke-width="1.5"/>
  <text x="600" y="260" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">Program Header Table</text>
  <text x="600" y="280" font-size="13" fill="#e6ffec" text-anchor="middle">segments: PT_LOAD, PT_DYNAMIC, PT_INTERP ...</text>
  <text x="600" y="297" font-size="12" fill="#a8e6b8" text-anchor="middle" font-style="italic">used by the kernel loader at runtime</text>

  <!-- Sections -->
  <rect x="130" y="320" width="940" height="170" rx="6" fill="#8957e5" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="600" y="343" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">Sections (raw bytes)</text>

  <g font-size="13" fill="#f3ecff" text-anchor="middle">
    <rect x="150" y="355" width="170" height="55" rx="4" fill="#3b2466" stroke="#bc8cff"/>
    <text x="235" y="378">.text</text>
    <text x="235" y="396" font-size="11" fill="#cdb8f0">code</text>

    <rect x="335" y="355" width="170" height="55" rx="4" fill="#3b2466" stroke="#bc8cff"/>
    <text x="420" y="378">.rodata</text>
    <text x="420" y="396" font-size="11" fill="#cdb8f0">constants</text>

    <rect x="520" y="355" width="170" height="55" rx="4" fill="#3b2466" stroke="#bc8cff"/>
    <text x="605" y="378">.data / .bss</text>
    <text x="605" y="396" font-size="11" fill="#cdb8f0">globals</text>

    <rect x="705" y="355" width="170" height="55" rx="4" fill="#3b2466" stroke="#bc8cff"/>
    <text x="790" y="378">.symtab</text>
    <text x="790" y="396" font-size="11" fill="#cdb8f0">symbol table</text>

    <rect x="150" y="425" width="345" height="55" rx="4" fill="#3b2466" stroke="#bc8cff"/>
    <text x="322" y="448">.dynsym</text>
    <text x="322" y="466" font-size="11" fill="#cdb8f0">dynamic symbol table</text>

    <rect x="520" y="425" width="355" height="55" rx="4" fill="#3b2466" stroke="#bc8cff"/>
    <text x="697" y="448">.strtab / .dynstr</text>
    <text x="697" y="466" font-size="11" fill="#cdb8f0">symbol name strings</text>
  </g>

  <!-- Section Header Table -->
  <rect x="130" y="505" width="940" height="60" rx="6" fill="#9e6a03" stroke="#d29922" stroke-width="1.5"/>
  <text x="600" y="530" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">Section Header Table</text>
  <text x="600" y="550" font-size="13" fill="#fff3d6" text-anchor="middle">name, type, flags, addr, offset, size for every section above</text>

  <text x="600" y="615" font-size="13" fill="#6e7681" text-anchor="middle">Field widths depend on ELF class: 4-byte addr/off on 32-bit, 8-byte on 64-bit (see /usr/include/elf.h)</text>
</svg>
